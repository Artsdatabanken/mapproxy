#############################################################################################
# Seeding configuration bildet (samlet) layer in MapProxy
# This file is used to define the seeding process for the Jan Mayen layer in MapProxy.
#
# Laget av: Kristian Julien, 2024-06-17  Artsdatabanken
#############################################################################################


coverages:

  svalbard:
    bbox: [300000, 8400000, 950000, 9050000]
    srs: EPSG:25833

  bjornoeya:
    bbox: [600000, 8250000, 640000, 8300000]
    srs: EPSG:25833

  janmayen:
    bbox: [-400000, 8000000, -250000, 8100000]
    srs: EPSG:25833

  nib:
    bbox: [-150000, 6350000, 1150000, 8000000]
    srs: EPSG:25833


seeds:

  svalbard_seed:
    caches: [svalbard_cache]
    coverages: [svalbard]
    levels: [3,4,5]

  bjornoeya_seed:
    caches: [bjornoya_cache]
    coverages: [bjornoeya]
    levels: [4,5]

  janmayen_seed:
    caches: [janmayen_cache]
    coverages: [janmayen]
    levels: [3,4,5]

  nib_seed:
    caches: [nib_cache]
    coverages: [nib]
    levels: [3,4]
  




